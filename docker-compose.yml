services:
  ultrabridge:
    image: ultrabridge:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ultrabridge
    container_name: ultrabridge
    ports:
      - "8443:8443"
      - "8089:8089"
    environment:
      - UB_DB_PATH=/data/ultrabridge.db
      - UB_LISTEN_ADDR=:8443
      - UB_TASK_DB_PATH=/data/ultrabridge-tasks.db
      - UB_MCP_PORT=8081
      - UB_LOG_FILE=/data/ultrabridge.log
      - UB_LOG_FILE_MAX_MB=100
      - UB_LOG_FILE_MAX_AGE_DAYS=30
      - UB_LOG_FILE_MAX_BACKUPS=10
      # UB-as-SPC server config (mode/file-root/device account+password) now lives
      # in the DB, set via Settings → "UB-as-SPC Device Sync Server". The UB_SPC_*
      # env vars were removed to test DB-backed config; env still overrides DB if
      # any are re-added. spc_listen_addr (:8089) and quota fall back to defaults.
    volumes:
      - ./ultrabridge-data:/data
      - /mnt/supernote:/mnt/supernote
      - /mnt/remarkable:/mnt/remarkable
    networks:
      - default
      - supernote_default
    restart: unless-stopped
  ub-mcp:
    image: ub-mcp:latest
    # Opt-in sidecar: only started when the "mcp" profile is active (rebuild.sh
    # enables it automatically when UB_MCP_API_TOKEN is set). Kept out of the
    # default set so the main service rebuilds without an .env. The token is
    # soft-defaulted (:-) rather than guarded (:?) because Compose interpolates
    # the whole file before filtering profiles — a hard guard here would block
    # every compose command, even ones that never touch this service.
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: Dockerfile
      target: ub-mcp
    container_name: ub-mcp
    ports:
      - "8081:8081"
    environment:
      - UB_MCP_API_URL=http://ultrabridge:8443
      # Bearer auth: token from .env (gitignored). Create via Settings → MCP Tokens.
      # Replaces UB_MCP_API_USER/PASS basic auth — no plaintext secret in this file.
      - UB_MCP_API_TOKEN=${UB_MCP_API_TOKEN:-}
      - UB_DB_PATH=/data/ultrabridge.db
    volumes:
      - ./ultrabridge-data:/data
    depends_on:
      - ultrabridge
    command: ["--http", ":8081"]
    restart: unless-stopped
networks:
  default:
    name: ultrabridge_default
  supernote_default:
    external: true
