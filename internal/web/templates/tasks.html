<!-- Tasks Tab -->
<div id="tasks" class="tab-content active">
    <!-- Create Task Form -->
    <div class="card">
        <h2>Create New Task</h2>
        <form hx-post="/tasks" hx-target="#task-table tbody" hx-swap="afterbegin" hx-push-url="false" hx-on:htmx:after-request="if (event.detail.successful) { this.reset(); const es = document.getElementById('empty-state-row'); if (es) es.remove(); }">
            <div class="form-group">
                <label for="title">Task Title *</label>
                <input type="text" id="title" name="title" required placeholder="Enter task title">
            </div>
            <div class="form-group">
                <label for="due_date">Due Date (optional)</label>
                <input type="date" id="due_date" name="due_date">
            </div>
            <button type="submit">Create Task</button>
        </form>
    </div>

    <!-- Task List -->
    <div class="card">
        <div class="toolbar">
            <h2>Task List</h2>
            <div class="flex-spacer"></div>
            <label class="text-small" style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="show-completed" onchange="recomputeTaskVisibility()" style="width: auto;">
                Show completed
            </label>
            <label class="text-small" style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem; margin-left: 1rem;">
                <input type="checkbox" id="show-deleted" onchange="recomputeTaskVisibility(); document.getElementById('purge-deleted-form').style.display = this.checked ? 'block' : 'none';" style="width: auto;">
                Show deleted{{if .DeletedCount}} <span class="text-small" style="color: var(--text-secondary, #6b7280);">({{.DeletedCount}})</span>{{end}}
            </label>
        </div>

        <div id="bulk-actions" style="display: none; margin-bottom: 1rem; padding: 1rem; background: var(--bg-color); border-radius: var(--radius); border: 1px solid var(--brand-color);">
            <span id="selected-count" class="text-small text-bold" style="margin-right: 1rem;">0 selected</span>
            <button type="button" hx-post="/tasks/bulk" hx-include=".task-checkbox:checked" hx-vals='{"action": "complete"}' hx-swap="none" hx-on:htmx:after-request="if(!event.detail.successful) return; const doc = new DOMParser().parseFromString('&lt;table&gt;&lt;tbody&gt;' + event.detail.xhr.responseText + '&lt;/tbody&gt;&lt;/table&gt;', 'text/html'); doc.querySelectorAll('tr[id^=&quot;task-&quot;]').forEach(newRow => { const existing = document.getElementById(newRow.id); if (existing) existing.replaceWith(newRow); }); updateBulkActions();" class="btn-small">Complete Selected</button>
            <button type="button" hx-post="/tasks/bulk" hx-include=".task-checkbox:checked" hx-vals='{"action": "delete"}' hx-swap="none" hx-on:htmx:after-request="if(!event.detail.successful) return; document.querySelectorAll('.task-checkbox:checked').forEach(cb => cb.closest('tr').remove()); updateBulkActions();" class="btn-small" style="background: var(--status-text-failed);" onclick="return confirm('Delete selected tasks? This cannot be undone.')">Delete Selected</button>
        </div>
        <div class="table-container">
            <table id="task-table">
                <thead>
                    <tr>
                        <th style="width: 2rem;"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .tasks}}
                    {{template "_task_row" .}}
                    {{end}}
                    {{if not .tasks}}
                    <tr id="empty-state-row"><td colspan="6" class="empty-state"><p>No tasks yet.</p><p>Create one above to get started!</p></td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
        <form hx-post="/tasks/purge-completed" hx-swap="none" hx-on:htmx:after-request="if(!event.detail.successful) return; document.querySelectorAll('#task-table tbody tr[data-status=&quot;completed&quot;]').forEach(r => r.remove());" style="margin-top:0.5rem; text-align:right;">
          <button type="submit" class="btn-small" style="background: var(--status-text-failed);" onclick="return confirm('Purge all completed tasks? This cannot be undone.')">✗ Purge Completed</button>
        </form>
        <form id="purge-deleted-form" hx-post="/tasks/purge-deleted" hx-swap="none" hx-on:htmx:after-request="if(!event.detail.successful) return; /* count badge would be stale + ancient rows are gone; full reload is the simple correct path */ location.reload();" style="margin-top:0.5rem; text-align:right; display:none;">
          <button type="submit" class="btn-small" style="background: var(--status-text-failed);" onclick="return confirm('Permanently delete soft-deleted tasks older than 30 days? This is IRREVERSIBLE — the rows are dropped from the database. Recently-deleted tasks (within 30 days) are kept as a safety window.')">✗ Purge Deleted (&gt;30 days)</button>
        </form>
    </div>
</div>

<script>
    // Re-initialize visibility on swap. Deferred to DOMContentLoaded because
    // layout.html defines recomputeTaskVisibility AFTER tab content; inline
    // invocation at first paint otherwise throws ReferenceError.
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof recomputeTaskVisibility === 'function') recomputeTaskVisibility();
    });
</script>
